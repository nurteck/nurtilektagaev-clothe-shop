# Render Blueprint — https://render.com/docs/blueprint-spec
# На free-плане Render только 1 PostgreSQL. Если лимит занят — используйте существующую БД:
# Render → ваша БД → Connections → Internal → скопируйте URL
# Render → oshop → Environment → DATABASE_URL → вставьте URL → Save → Manual Deploy

services:
  - type: web
    name: oshop
    runtime: node
    plan: free
    buildCommand: npm install && npm run build:render
    startCommand: npm run start:prod --workspace=server
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        sync: false
