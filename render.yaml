# Render Blueprint: https://render.com/docs/blueprint-spec
# После push в GitHub: Render → New → Blueprint → выберите репозиторий

databases:
  - name: oshop-db
    plan: free
    databaseName: oshop
    user: oshop

services:
  - type: web
    name: oshop
    runtime: node
    plan: free
    buildCommand: npm install && npm run build:render
    startCommand: npm run start:prod --workspace=server
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: oshop-db
          property: connectionString
